syntax = "proto3";

package chat;

option go_package = "dan-ai/proto/chat";

import "chat/chat.proto";
import "google/protobuf/timestamp.proto";

service ChatService {
  // Session operations
  rpc CreateSession(CreateSessionRequest) returns (CreateSessionResponse);
  rpc ListSessions(ListSessionsRequest) returns (ListSessionsResponse);
  rpc RenameSession(RenameSessionRequest) returns (RenameSessionResponse);
  rpc DeleteSession(DeleteSessionRequest) returns (DeleteSessionResponse);

  // Message operations
  rpc CreateMessage(CreateMessageRequest) returns (CreateMessageResponse);
  rpc ListMessages(ListMessagesRequest) returns (ListMessagesResponse);
  rpc DeleteMessage(DeleteMessageRequest) returns (DeleteMessageResponse);

  // Unified Chat endpoint
  rpc SendChatMessage(SendChatMessageRequest) returns (SendChatMessageResponse);
}

// Session messages

message CreateSessionRequest {
  string visitor_id = 1;
  string prompt_id = 2;
}

message CreateSessionResponse {
  ChatSession session = 1;
}

message ListSessionsRequest {
  string visitor_id = 1;
}

message ListSessionsResponse {
  repeated ChatSession sessions = 1;
}

message RenameSessionRequest {
  string id = 1;
  string title = 2;
}

message RenameSessionResponse {
  ChatSession session = 1;
}

message DeleteSessionRequest {
  string id = 1;
}

message DeleteSessionResponse {
  bool success = 1;
}

// Message messages

message CreateMessageRequest {
  string session_id = 1;
  string role = 2;
  string content = 3;
}

message CreateMessageResponse {
  ChatMessage message = 1;
}

message ListMessagesRequest {
  string session_id = 1;
}

message ListMessagesResponse {
  repeated ChatMessage messages = 1;
}

message DeleteMessageRequest {
  string id = 1;
}

message DeleteMessageResponse {
  bool success = 1;
}

// Unified Chat messages

message SendChatMessageRequest {
  string session_id = 1;
  string visitor_id = 2;
  string prompt_id = 3;
  string content = 4;
}

message RecentMessage {
  string role = 1;
  string content = 2;
  google.protobuf.Timestamp created_at = 3;
}

message SendChatMessageResponse {
  string session_id = 1;
  string visitor_id = 2;
  string content = 3;
  repeated RecentMessage recent_messages = 4;
}
